<div class="demo-page">
  <header class="demo-header">
    <h1>Security Demo</h1>
    <p>Interactive demos for @angular-helpers/security services</p>
  </header>

  <!-- Reusable Demo Components -->
  <app-regex-security-demo />
  <app-web-crypto-demo />
  <app-secure-storage-demo />

  <!-- Shared Log -->
  <section class="demo-section log-section">
    <div class="log-header">
      <h3>Activity Log</h3>
      <button (click)="clearLogs()" class="btn btn-secondary">Clear</button>
    </div>
    <div class="log-entries">
      @for (log of logs(); track log.id) {
        <div class="log-entry" [class]="log.type">
          <span class="log-time">{{ log.time }}</span>
          <span class="log-section-badge">{{ log.section }}</span>
          <span class="log-message">{{ log.message }}</span>
        </div>
      } @empty {
        <div class="log-empty">No activity yet. Try the demos above!</div>
      }
    </div>
  </section>
</div>
