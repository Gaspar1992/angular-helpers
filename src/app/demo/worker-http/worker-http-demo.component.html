<div class="demo-page">
  <header class="demo-header">
    <h1>Worker HTTP — POC</h1>
    <p>Manual testing for transport, WebCrypto, and worker pipeline</p>
  </header>

  <app-transport-demo />
  <app-hmac-demo />
  <app-hashing-demo />

  <section class="svc-card" aria-labelledby="log-title">
    <div class="svc-card-head">
      <h2 class="svc-card-title" id="log-title">Activity Log</h2>
      <button class="btn btn-secondary" (click)="clearLogs()" [disabled]="logs().length === 0">
        Clear
      </button>
    </div>
    @if (logs().length === 0) {
      <p class="svc-desc">No activity yet.</p>
    } @else {
      <div class="msg-log">
        @for (entry of logs(); track entry.id) {
          <div
            class="msg-row"
            [class.msg-sent]="entry.type === 'success'"
            [class.msg-recv]="entry.type === 'error'"
          >
            <span class="msg-dir">{{ entry.section }}</span>
            <span class="msg-text">{{ entry.message }}</span>
            <span class="msg-time">{{ entry.time }}</span>
          </div>
        }
      </div>
    }
  </section>
</div>
