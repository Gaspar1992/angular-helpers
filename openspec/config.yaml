project: angular-helpers
store_mode: openspec
execution_mode: interactive
delivery_strategy: ask-on-risk
strict_tdd: true
stack:
  framework: Angular v21
  packageManager: pnpm
  compiler: TypeScript
  buildTool: Vite
testing:
  unit:
    tool: Vitest
    command: pnpm test
    watch_command: pnpm test:watch
    config: vitest.config.ts
  e2e:
    tool: Playwright
    command: pnpm test:browser
    config: playwright.config.ts
  linting:
    tool: oxlint & eslint
    command: pnpm lint
  formatting:
    tool: oxfmt
    command: pnpm format
