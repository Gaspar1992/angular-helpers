name: Publish Packages

on:
  release:
    types:
      - published

# Core security configuration for OIDC and Provenance
permissions:
  id-token: write # Required for OIDC identity federation
  contents: read # Required for source checkout

concurrency:
  # Allow only one publish run at a time
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        package:
          - name: '@angular-helpers/storage'
            path: packages/storage
          - name: '@angular-helpers/worker-http'
            path: packages/worker-http
          - name: '@angular-helpers/browser-web-apis'
            path: packages/browser-web-apis
          - name: '@angular-helpers/security'
            path: packages/security
          - name: '@angular-helpers/openlayers'
            path: packages/openlayers
          - name: '@angular-helpers/core'
            path: packages/core

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build All Packages
        run: pnpm -r build

      - name: Publish Package with Provenance
        run: |
          cd ${{ matrix.package.path }}
          # npm publish with OIDC trust and provenance generation
          # Note: No manual tokens required if OIDC is configured in npm
          npm publish --provenance --access public
        env:
          # Required by npm to detect CI environment
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
