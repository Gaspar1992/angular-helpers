name: Publish Packages

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions: {}

concurrency:
  # Allow only one publish run at a time to avoid racy npm publishes.
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.package.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: '@angular-helpers/browser-web-apis'
            workspace: packages/browser-web-apis
            dist: dist/browser-web-apis
          - name: '@angular-helpers/security'
            workspace: packages/security
            dist: dist/security
          - name: '@angular-helpers/worker-http'
            workspace: packages/worker-http
            dist: dist/worker-http
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org

      - name: Build ${{ matrix.package.name }} (production)
        run: npm run build:prod --workspace ${{ matrix.package.workspace }}

      - name: Publish ${{ matrix.package.name }}
        id: publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_WORKSPACE: ${{ matrix.package.workspace }}
          PACKAGE_DIST: ${{ matrix.package.dist }}
        run: |
          PACKAGE_NAME=$(node -p "require('./${PACKAGE_WORKSPACE}/package.json').name")
          PACKAGE_VERSION=$(node -p "require('./${PACKAGE_WORKSPACE}/package.json').version")
          RELEASE_TAG="${PACKAGE_NAME}@${PACKAGE_VERSION}"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "${RELEASE_TAG} is already published. Skipping."
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm publish "./${PACKAGE_DIST}" --access public
          {
            echo "published=true"
            echo "release_tag=${RELEASE_TAG}"
            echo "package_name=${PACKAGE_NAME}"
            echo "package_version=${PACKAGE_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release for ${{ matrix.package.name }}
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_TAG: ${{ steps.publish.outputs.release_tag }}
          PACKAGE_NAME: ${{ steps.publish.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.publish.outputs.package_version }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "${PACKAGE_NAME} v${PACKAGE_VERSION}" \
            --notes "## ${PACKAGE_NAME}@${PACKAGE_VERSION}

          📦 Published to npm: https://www.npmjs.com/package/${PACKAGE_NAME}/v/${PACKAGE_VERSION}

          ### Install

          \`\`\`bash
          npm install ${PACKAGE_NAME}@${PACKAGE_VERSION}
          \`\`\`

          See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." \
            --latest=false
