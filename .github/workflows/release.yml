# Release Workflow
# This workflow runs on every push to the main branch.

name: Release

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup

      - name: Bootstrap first release to 21.x
        run: |
          for pkg in core browser-web-apis storage security worker-http openlayers testing; do
            if ! git tag --list "@angular-helpers/${pkg}@*" | grep -q .; then
              git tag "@angular-helpers/${pkg}@21.14.0"
              git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "refs/tags/@angular-helpers/${pkg}@21.14.0"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build all packages in topological order
        run: pnpm run build:packages:prod

      - name: Strip workspace protocol from built packages dynamically
        run: |
          core_version=$(node -p "require('./packages/core/package.json').version")
          echo "Replacing workspace:* with ^$core_version"
          find dist -name "package.json" -exec sed -i "s/\"workspace:\*\"/\"^$core_version\"/g" {} +

      - name: Semantic Release (Core)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
        working-directory: packages/core

      - name: Semantic Release (Browser Web APIs)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
        working-directory: packages/browser-web-apis

      - name: Semantic Release (Storage)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
        working-directory: packages/storage

      - name: Semantic Release (Security)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
        working-directory: packages/security

      - name: Semantic Release (Worker HTTP)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
        working-directory: packages/worker-http

      - name: Semantic Release (OpenLayers)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
        working-directory: packages/openlayers

      - name: Publish to npm with Provenance
        run: |
          for pkg in core browser-web-apis storage security worker-http openlayers; do
            if [ -d "dist/$pkg" ]; then
              echo "Publishing $pkg..."
              (cd dist/$pkg && npm publish --provenance --access public || echo "Skipped publishing $pkg")
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release artifact changes
        id: release_changes
        run: |
          if git diff --quiet -- \
            packages/core/CHANGELOG.md packages/core/package.json \
            packages/browser-web-apis/CHANGELOG.md packages/browser-web-apis/package.json \
            packages/storage/CHANGELOG.md packages/storage/package.json \
            packages/security/CHANGELOG.md packages/security/package.json \
            packages/worker-http/CHANGELOG.md packages/worker-http/package.json \
            packages/openlayers/CHANGELOG.md packages/openlayers/package.json \
            pnpm-lock.yaml; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release artifacts PR
        if: steps.release_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.5
        env:
          HUSKY: 0
        with:
          token: ${{ secrets.GH_TOKEN }}
          branch: chore/release-artifacts
          delete-branch: true
          commit-message: 'chore(release): update changelog and package versions'
          title: 'chore(release): update changelog and package versions'
          body: |
            ## Summary
            - Update release artifacts generated by `semantic-release`.
            - Persist `CHANGELOG.md`, `package.json`, and `pnpm-lock.yaml` through PR flow.

            ## Notes
            - Required because `main` is protected and disallows direct pushes.
          add-paths: |
            packages/core/CHANGELOG.md
            packages/core/package.json
            packages/browser-web-apis/CHANGELOG.md
            packages/browser-web-apis/package.json
            packages/storage/CHANGELOG.md
            packages/storage/package.json
            packages/security/CHANGELOG.md
            packages/security/package.json
            packages/worker-http/CHANGELOG.md
            packages/worker-http/package.json
            packages/openlayers/CHANGELOG.md
            packages/openlayers/package.json
            pnpm-lock.yaml
