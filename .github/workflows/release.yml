# Release Workflow
# This workflow runs on every push to the main branch.

name: Release

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup

      - name: Bootstrap first release to 21.x
        run: |
          if git tag --list 'v*' | grep -q .; then
            echo "Existing release tags detected. Skipping bootstrap."
            exit 0
          fi

          git tag v20.0.0
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" refs/tags/v20.0.0
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Run Release
        run: npx semantic-release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Detect release artifact changes
        id: release_changes
        run: |
          if git diff --quiet -- CHANGELOG.md package.json package-lock.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release artifacts PR
        if: steps.release_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.5
        env:
          HUSKY: 0
        with:
          token: ${{ secrets.GH_TOKEN }}
          branch: chore/release-artifacts
          delete-branch: true
          commit-message: 'chore(release): update changelog and package versions'
          title: 'chore(release): update changelog and package versions'
          body: |
            ## Summary
            - Update release artifacts generated by `semantic-release`.
            - Persist `CHANGELOG.md`, `package.json`, and `package-lock.json` through PR flow.

            ## Notes
            - Required because `main` is protected and disallows direct pushes.
          add-paths: |
            CHANGELOG.md
            package.json
            package-lock.json
